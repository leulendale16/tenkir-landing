<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Waitlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/tokens.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#09090f] text-white min-h-screen p-8 font-['Inter']">
  <div class="max-w-4xl mx-auto">
    <a href="index.html" class="text-brand-400 hover:text-brand-300 transition-colors text-sm font-semibold mb-6 inline-block">&larr; Back to Landing Page</a>
    <h1 class="font-display font-bold text-3xl mb-8">Admin Dashboard</h1>

    <!-- Login Section -->
    <div id="login-section" class="max-w-sm glass p-8 rounded-2xl glow-border">
      <h2 class="text-xl font-bold mb-4">Admin Login</h2>
      <p class="text-slate-400 text-sm mb-6">Log in with your existing Tenkir Supabase credentials.</p>
      <form id="login-form" class="space-y-4">
        <div>
          <input type="email" id="login-email" placeholder="Admin Email" required class="input-field w-full px-4 py-3 rounded-xl text-sm" />
        </div>
        <div>
          <input type="password" id="login-password" placeholder="Password" required class="input-field w-full px-4 py-3 rounded-xl text-sm" />
        </div>
        <button type="submit" class="btn-primary w-full py-3 rounded-xl text-sm font-semibold">Log In</button>
        <button type="button" onclick="showWaitlist(true)" class="w-full py-3 mt-2 rounded-xl text-sm font-semibold border border-white/20 text-slate-300 hover:bg-white/5 transition-colors">Bypass Login (View Local Data)</button>
      </form>
      <p id="login-error" class="text-red-400 text-sm mt-4 hidden"></p>
    </div>

    <!-- Waitlist Section (Hidden by default) -->
    <div id="waitlist-section" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold">Early Access Waitlist</h2>
        <button onclick="handleLogout()" class="text-slate-400 hover:text-white text-sm">Logout</button>
      </div>
      
      <div class="glass rounded-2xl overflow-hidden glow-border">
        <table class="w-full text-left text-sm">
          <thead class="bg-white/5 text-slate-300">
            <tr>
              <th class="px-6 py-4 font-medium">Email Address</th>
              <th class="px-6 py-4 font-medium">Signup Date</th>
            </tr>
          </thead>
          <tbody id="waitlist-body" class="divide-y divide-white/5">
            <tr><td colspan="2" class="px-6 py-8 text-center text-slate-500">Loading waitlist data...</td></tr>
          </tbody>
        </table>
      </div>
      <p id="fallback-notice" class="text-amber-400 text-xs mt-4 hidden">Showing local fallback data. Ensure the `waitlist` table is created in Supabase.</p>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://ganfmihjqgadexmlleio.supabase.co';
    const supabaseKey = 'sb_publishable_O3RFdjxDq5oIy18VCI5_Sw_IPgcdc-w';
    let supabase = null;
    try {
      if (window.supabase) {
        supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
      }
    } catch (e) {
      console.error("Failed to initialize Supabase:", e);
    }

    const loginSection = document.getElementById('login-section');
    const waitlistSection = document.getElementById('waitlist-section');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const waitlistBody = document.getElementById('waitlist-body');
    const fallbackNotice = document.getElementById('fallback-notice');

    // Check session on load
    async function checkSession() {
      if (!supabase) {
        loginSection.classList.remove('hidden');
        waitlistSection.classList.add('hidden');
        return;
      }
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          showWaitlist();
        } else {
          loginSection.classList.remove('hidden');
          waitlistSection.classList.add('hidden');
        }
      } catch (e) {
        console.error(e);
        loginSection.classList.remove('hidden');
        waitlistSection.classList.add('hidden');
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      loginError.classList.add('hidden');
      if (!supabase) {
        loginError.textContent = "Database connection failed. Please use Bypass Login.";
        loginError.classList.remove('hidden');
        return;
      }

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
          loginError.textContent = error.message;
          loginError.classList.remove('hidden');
        } else {
          showWaitlist();
        }
      } catch (e) {
        loginError.textContent = e.message;
        loginError.classList.remove('hidden');
      }
    });

    async function handleLogout() {
      if (supabase) await supabase.auth.signOut();
      loginSection.classList.remove('hidden');
      waitlistSection.classList.add('hidden');
      loginForm.reset();
    }

    async function showWaitlist(forceLocal = false) {
      loginSection.classList.add('hidden');
      waitlistSection.classList.remove('hidden');
      waitlistBody.innerHTML = '<tr><td colspan="2" class="px-6 py-8 text-center text-slate-500">Loading waitlist data...</td></tr>';
      
      if (forceLocal) {
        fallbackNotice.classList.remove('hidden');
        const localData = JSON.parse(localStorage.getItem('tenkir_waitlist') || '[]');
        renderTable(localData.map(d => ({ email: d.email, created_at: d.date })));
        return;
      }

      // Try to fetch from Supabase
      const { data, error } = await supabase
        .from('waitlist')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error fetching from Supabase:', error.message);
        fallbackNotice.classList.remove('hidden');
        // Load from local storage
        const localData = JSON.parse(localStorage.getItem('tenkir_waitlist') || '[]');
        renderTable(localData.map(d => ({ email: d.email, created_at: d.date })));
      } else {
        fallbackNotice.classList.add('hidden');
        renderTable(data);
      }
    }

    function renderTable(data) {
      if (!data || data.length === 0) {
        waitlistBody.innerHTML = '<tr><td colspan="2" class="px-6 py-8 text-center text-slate-500">No signups yet.</td></tr>';
        return;
      }
      
      waitlistBody.innerHTML = '';
      data.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-white/5 transition-colors";
        
        const tdEmail = document.createElement('td');
        tdEmail.className = "px-6 py-4 text-slate-300";
        tdEmail.textContent = row.email;
        
        const tdDate = document.createElement('td');
        tdDate.className = "px-6 py-4 text-slate-500 text-xs";
        const dateStr = row.created_at ? new Date(row.created_at).toLocaleString() : 'Unknown Date';
        tdDate.textContent = dateStr;
        
        tr.appendChild(tdEmail);
        tr.appendChild(tdDate);
        waitlistBody.appendChild(tr);
      });
    }

    checkSession();
  </script>
</body>
</html>
