<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Waitlist</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0d1f; color: #fff; padding: 2rem; }
    h1 { color: #a78bfa; }
    table { width: 100%; max-width: 600px; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { background: rgba(139,92,246,0.1); }
    .back { margin-bottom: 1rem; display: inline-block; color: #a78bfa; text-decoration: none; }
  </style>
</head>
<body>
  <a href="index.html" class="back">&larr; Back to Landing Page</a>
  <h1>Waitlist Signups</h1>
  <table id="waitlist-table">
    <thead>
      <tr>
        <th>Email</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="waitlist-body">
      <!-- Generated by JS -->
    </tbody>
  </table>

  <script>
    const waitlist = JSON.parse(localStorage.getItem('tenkir_waitlist') || '[]');
    const tbody = document.getElementById('waitlist-body');
    if (waitlist.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2">No signups yet.</td></tr>';
    } else {
      waitlist.forEach(entry => {
        const tr = document.createElement('tr');
        const tdEmail = document.createElement('td');
        tdEmail.textContent = entry.email;
        const tdDate = document.createElement('td');
        tdDate.textContent = new Date(entry.date).toLocaleString();
        tr.appendChild(tdEmail);
        tr.appendChild(tdDate);
        tbody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
